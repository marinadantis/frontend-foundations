<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=download"
    />
  </head>
  <body>
    <main class="container">
      <div class="profile-card">
        <img
          src="./assets/images/profile-image.jpg"
          alt="Portrait of Marina Dantis"
          class="profile-picture"
        />
        <h1 class="name">Marina Dantis</h1>
        <div class="position"><p>Frontend Developer</p></div>

        <section class="social-links">
          <a
            href="https://www.linkedin.com/in/marina-dantis/"
            aria-label="LinkedIn"
            target="_blank"
            rel="noopener noreferrer"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="#0077b5"
            >
              <path
                d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"
              />
            </svg>
          </a>

          <a
            href="https://github.com/marinadantis"
            aria-label="Github"
            target="_blank"
            rel="noopener noreferrer"
          >
            <svg
              xmlns="http://w3.org"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
              ></path>
            </svg>
          </a>
        </section>

        <section class="profile-details">
          <ul class="divide-y">
            <li>
              <svg
                xmlns="http://w3.org"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="5" y="2" width="14" height="20" rx="3"></rect>
                <!-- The top notch -->
                <path d="M9 2v1a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1V2"></path>
                <!-- The bottom indicator line -->
                <path d="M10 20h4"></path>
              </svg>
              <div class="profile-row">
                <span class="row-label">Phone</span>
                <a href="tel:971588813557"> <span class="row-data">+971 588 813 557</span></a>
              </div>
            </li>
            <li>
              <svg
                xmlns="http://w3.org"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                ></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
              <div class="profile-row">
                <span class="row-label">Email</span>
                <a href="mailto:marina.dantis@gmail.com"
                  ><span class="row-data">marina.dantis@gmail.com</span></a
                >
              </div>
            </li>
            <li>
              <svg
                xmlns="http://w3.org"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
              </svg>
              <div class="profile-row">
                <span class="row-label">Location</span>
                <span class="row-data">Dubai, UAE</span>
              </div>
            </li>
            <li>
              <svg
                xmlns="http://w3.org"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <!-- Cake Base -->
                <path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"></path>
                <path d="M4 16h16"></path>
                <!-- Candles -->
                <path d="M8 11V7"></path>
                <path d="M12 11V7"></path>
                <path d="M16 11V7"></path>
              </svg>
              <div class="profile-row">
                <span class="row-label">Birthday</span>
                <span class="row-data">August 18, 1990</span>
              </div>
            </li>
          </ul>
        </section>

        <section class="download-cv">
          <a
            href="assets/pdfs/CV.pdf"
            download="Marina-Dantis-CV.pdf"
            id="download-cv-link"
            class="btn-link"
          >
            <span class="material-symbols-outlined"> download </span> Download
            CV</a
          >
        </section>
      </div>
    </main>
  </body>
</html>
